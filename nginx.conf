server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    autoindex off;

    charset utf-8;

    location = / {
        return 302 /views/main.html;
    }

    location ^~ /views/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /resources/css/    { try_files $uri =404; }
    location ^~ /resources/fonts/  { try_files $uri =404; }
    location ^~ /resources/images/ { try_files $uri =404; }
    location ^~ /resources/js/     { try_files $uri =404; }
    location ^~ /resources/lib/    { try_files $uri =404; }

    location / {
        return 403;
    }

    location ~ /\. {
        deny all;
    }
}